<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Free AI Paraphrasing Tool</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

p{
    color:#666;
    font-size:20px;
}

textarea{
    width:100%;
    height:300px;
    padding:20px;
    font-size:32px;
    border-radius:12px;
    border:1px solid #ccc;
    resize:vertical;
    box-sizing:border-box;
    margin-top:20px;
}

.buttons{
    margin-top:20px;
}

button{
    padding:16px 30px;
    border:none;
    border-radius:10px;
    background:#1a73e8;
    color:white;
    font-size:24px;
    cursor:pointer;
    margin-right:10px;
}

button:hover{
    background:#0b57d0;
}

#count{
    margin-top:10px;
    color:#666;
    font-size:20px;
}

#result{
    margin-top:30px;
    background:#f0f0f0;
    padding:25px;
    border-radius:12px;
    min-height:180px;
    white-space:pre-wrap;
    font-size:28px;
    line-height:1.6;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#777;
    font-size:18px;
}

</style>

</head>
<body>

<div class="container">

<h1>Free AI Paraphrasing Tool</h1>

<p>
Rewrite essays, emails, articles, blogs, and content instantly using AI.
</p>

<textarea
id="input"
placeholder="Paste your text here..."
oninput="updateCount()"
></textarea>

<div id="count">0 characters</div>

<div class="buttons">
<button onclick="rewriteText()">Rewrite</button>
<button onclick="copyResult()">Copy</button>
</div>

<p>Free daily rewrites available.</p>

<div id="result"></div>

<div class="footer">
Free AI Rewrite Tool • Instant Results
</div>

</div>

<script>

function updateCount(){

    const text =
    document.getElementById("input").value;

    document.getElementById("count").innerText =
    text.length + " characters";
}

async function rewriteText(){

    const text =
    document.getElementById("input").value;

    if(!text){

        alert("Please enter text.");

        return;
    }

    let usage =
    localStorage.getItem("usage") || 0;

    if(usage >= 5){

        alert("Daily free limit reached.");

        return;
    }

    document.getElementById("result").innerText =
    "Rewriting...";

    try{

        const response = await fetch("/api/rewrite",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                text:text
            })

        });

        const data =
        await response.json();

        document.getElementById("result").innerText =
        data.result || "API Error";

        usage++;

        localStorage.setItem("usage", usage);

    }catch(error){

        document.getElementById("result").innerText =
        "Error: " + error;
    }
}

function copyResult(){

    const text =
    document.getElementById("result").innerText;

    if(!text){

        alert("Nothing to copy.");

        return;
    }

    navigator.clipboard.writeText(text);

    alert("Copied!");
}

</script>

</body>
</html>
