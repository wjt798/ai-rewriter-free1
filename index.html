<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Rewriter Pro</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.08);
}

h1{
font-size:55px;
margin-bottom:10px;
}

p{
color:#666;
}

textarea{
width:100%;
height:220px;
padding:20px;
font-size:20px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
box-sizing:border-box;
margin-top:20px;
}

button{
padding:14px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
margin-right:10px;
background:#2563eb;
color:white;
}

button:hover{
opacity:0.9;
}

select{
padding:12px;
font-size:16px;
border-radius:8px;
margin-top:15px;
}

#result{
margin-top:30px;
background:#f1f1f1;
padding:25px;
border-radius:10px;
min-height:200px;
white-space:pre-wrap;
line-height:1.8;
font-size:18px;
}

.dark{
background:#111;
color:white;
}

.dark .container{
background:#1e1e1e;
}

.dark textarea{
background:#222;
color:white;
border:1px solid #555;
}

.dark #result{
background:#222;
}

.footer{
margin-top:20px;
text-align:center;
color:#888;
font-size:14px;
}

</style>
</head>

<body id="body">

<div class="container">

<h1>AI Rewriter Pro</h1>

<p>
Academic • SEO • Humanizer • AI Detector Bypass • Translation
</p>

<select id="mode">
<option value="humanizer">Humanizer Mode</option>
<option value="academic">Academic Mode</option>
<option value="seo">SEO Mode</option>
<option value="bypass">AI Detector Bypass</option>
<option value="translate">Translate</option>
<option value="social">Social Media Post</option>
<option value="title">Generate Titles</option>
</select>

<textarea
id="input"
placeholder="Paste your text here..."
oninput="updateCount()"
></textarea>

<div id="count">0 characters</div>

<button onclick="rewriteText()">Rewrite</button>

<button onclick="copyResult()">Copy</button>

<button onclick="toggleDark()">Dark Mode</button>

<div id="result"></div>

<div class="footer">
Powered by DeepSeek AI
</div>

</div>

<script>

function updateCount(){

const text =
document.getElementById("input").value;

document.getElementById("count").innerText =
text.length + " characters";

}

function toggleDark(){

document.getElementById("body")
.classList.toggle("dark");

}

async function rewriteText(){

const text =
document.getElementById("input").value;

const mode =
document.getElementById("mode").value;

if(!text){

alert("Please enter text");

return;

}

document.getElementById("result").innerText =
"AI is thinking...";

try{

const response =
await fetch("/api/rewrite",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text,
mode
})

});

const data =
await response.json();

document.getElementById("result").innerText =
data.result || "Error";

}
catch(error){

document.getElementById("result").innerText =
"Error: " + error;

}

}

function copyResult(){

const text =
document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Copied!");

}

</script>

</body>
</html>
